<main
  id="main-content"
  tabindex="-1"
  class="relative min-h-dvh overflow-hidden bg-muted px-4 py-5 text-(--foreground) md:px-5 md:py-6 lg:px-6 lg:py-8"
>
  <div aria-hidden="true" class="pointer-events-none absolute inset-0"></div>
  <div aria-hidden="true" class="hidden"></div>

  <section class="relative z-10 mx-auto flex w-full max-w-312 flex-col gap-4">
    <div
      class="flex flex-wrap items-center justify-between gap-3 rounded-[1.6rem] border border-(--line) bg-(--hero-surface) p-4 shadow-[0_1rem_1.9rem_var(--shadow-soft)] md:p-5"
    >
      <div class="min-w-0">
        <p class="text-[0.69rem] font-bold uppercase tracking-[0.22em] text-(--accent-text-strong)">
          Task Editor
        </p>
        <h1 class="mt-1.5 text-[clamp(1.9rem,1.45rem+1.5vw,3rem)] leading-[0.98] text-balance">
          {{ pageTitle() }}
        </h1>
        <p
          class="pt-3 max-w-156 text-[0.94rem] leading-[1.58] text-(--muted-foreground) text-pretty"
        >
          {{ pageSummary() }}
        </p>
      </div>

      <button type="button" class="btn btn-secondary" (click)="cancel()">Back to Tasks</button>
    </div>

    <section
      class="rounded-[1.6rem] border border-(--line) bg-(--panel-surface) p-4 shadow-[0_1rem_1.9rem_var(--shadow-soft)] md:p-5"
    >
      <app-task-editor-form
        [taskId]="taskId()"
        (cancelled)="cancel()"
        (saved)="handleSaved($event)"
        (taskMissing)="handleTaskMissing($event)"
      />
    </section>
  </section>
</main>
